<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PhysicsEasy | HKDSE 物理學習平台</title>
<meta name="description" content="HKDSE 物理科互動學習平台：概念筆記、歷屆試題、錯題追蹤與高保真模擬。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
a{color:inherit;text-decoration:none}
button{font:inherit;background:none;border:none;color:inherit}

:root{
  --background:#000;
  --foreground:#fff;
  --font-sans:"Inter","Noto Sans TC","PingFang TC","Microsoft JhengHei",ui-sans-serif,system-ui,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,monospace;
}
body{
  background-color:var(--background); color:var(--foreground);
  font-family:var(--font-sans); -webkit-font-smoothing:antialiased;
  letter-spacing:-0.01em;
}
::selection{background:#fff;color:#000}

/* ── Liquid glass (motionsites-style) ── */
.liquid-glass{
  background:rgba(255,255,255,0.01);
  background-blend-mode:luminosity;
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  border:none;
  box-shadow:inset 0 1px 1px rgba(255,255,255,0.1);
  position:relative; overflow:hidden;
}
.liquid-glass::before{
  content:""; position:absolute; inset:0; border-radius:inherit; padding:1.4px;
  background:linear-gradient(180deg,
    rgba(255,255,255,.45) 0%, rgba(255,255,255,.15) 20%,
    rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
    rgba(255,255,255,.15) 80%, rgba(255,255,255,.45) 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude;
  pointer-events:none;
}
.glass-pill{
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border-radius:9999px;
  box-shadow:none !important;
}

/* ── Shell: one screen, no scroll ── */
main{
  position:relative; background:#000;
  height:100dvh; width:100vw;
  display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
}

/* ── Background "video" = live physics canvas ── */
.bg{position:absolute; inset:0; overflow:hidden; pointer-events:none}
.bg canvas{
  display:block; width:100%; height:100%;
  opacity:0; transition:opacity .7s ease;
}
.bg canvas.on{opacity:1}
.vignette{
  position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(120% 75% at 50% 45%, rgba(0,0,0,.72) 0%, rgba(0,0,0,.35) 45%, rgba(0,0,0,0) 78%),
    linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,0) 22%, rgba(0,0,0,0) 62%, rgba(0,0,0,.75));
}

/* ── Navbar ── */
nav{position:relative; z-index:20; padding:1.5rem; width:100%;
  animation:navIn .8s cubic-bezier(.16,1,.3,1) both}
@keyframes navIn{from{transform:translateY(-20px);opacity:0}to{transform:none;opacity:1}}
.nav-inner{
  border-radius:9999px; padding:.75rem 1.5rem;
  display:flex; align-items:center; justify-content:space-between;
  max-width:64rem; margin:0 auto;
}
.brand{display:flex; align-items:center; gap:.5rem; font-weight:600; font-size:1.05rem}
.nav-left{display:flex; align-items:center; gap:2rem}
.nav-links{display:none; align-items:center; gap:2rem; color:rgba(255,255,255,.8); font-size:.875rem; font-weight:500}
.nav-links a{transition:color .3s}
.nav-links a:hover{color:#fff}
.nav-right{display:flex; align-items:center; gap:1rem}
.btn-text{font-size:.875rem; font-weight:500; cursor:pointer; transition:color .3s}
.btn-text:hover{color:rgba(255,255,255,.8)}
.btn-glass{
  border-radius:9999px; padding:.5rem 1.5rem; font-size:.875rem; font-weight:500;
  cursor:pointer; transition:opacity .3s;
}
.btn-glass:hover{opacity:.9}
@media(min-width:768px){.nav-links{display:flex}}

/* ── Hero ── */
.hero{
  position:relative; z-index:10; flex:1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:0 1.5rem; text-align:center;
  min-height:0;
}
.hero-inner{
  max-width:64rem; margin:0 auto; width:100%;
  display:flex; flex-direction:column; align-items:center; gap:1.6rem;
}
.tagline{
  margin:0; font-family:var(--mono);
  color:rgba(255,255,255,.8); font-size:10px; font-weight:500;
  letter-spacing:.2em; text-transform:uppercase;
  animation:up .8s .1s cubic-bezier(.16,1,.3,1) both;
}
h1{
  font-family:"Instrument Serif","Noto Serif TC",serif;
  font-weight:500; letter-spacing:-.01em; line-height:1.14;
  font-size:clamp(2.1rem,6.4vw,64px); margin:0; max-width:56rem;
  background:linear-gradient(to bottom,#fff,rgba(255,255,255,.95),rgba(255,255,255,.7));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  animation:up 1s cubic-bezier(.16,1,.3,1) both;
}
.sub{
  margin:0; max-width:40rem; font-size:.94rem; line-height:1.85; font-weight:300;
  color:rgba(255,255,255,.62);
  animation:up 1s .2s cubic-bezier(.16,1,.3,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* swap animation when topic changes */
.swap{animation:swapIn .55s cubic-bezier(.16,1,.3,1)}
@keyframes swapIn{from{opacity:0;transform:translateY(12px);filter:blur(6px)}to{opacity:1;transform:none;filter:none}}

/* ── Readouts ── */
.stats{display:flex; gap:1.6rem; flex-wrap:wrap; justify-content:center; font-family:var(--mono)}
.stat{display:flex; flex-direction:column; align-items:center; gap:.25rem}
.stat b{font-size:1.05rem; font-weight:500; color:rgba(255,255,255,.92)}
.stat span{font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.4)}

/* ── CTA ── */
.cta{min-height:50px; margin-top:.2rem; display:flex; justify-content:center;
  animation:up 1s .4s cubic-bezier(.16,1,.3,1) both}
.cta-btn{
  padding:.75rem 2.5rem; font-size:14px; font-weight:500;
  border:1px solid rgba(255,255,255,.1); border-radius:9999px;
  color:rgba(255,255,255,.9); backdrop-filter:blur(4px); cursor:pointer;
  transition:border-color .3s,background .3s;
}
.cta-btn:hover{border-color:rgba(255,255,255,.3); background:rgba(255,255,255,.02)}
.cta-form{
  display:flex; align-items:center; gap:.5rem;
  padding:.375rem .375rem .375rem 1.25rem; font-size:14px; font-weight:500;
  border:1px solid rgba(255,255,255,.2); border-radius:9999px;
  background:rgba(255,255,255,.02); backdrop-filter:blur(4px);
  width:100%; max-width:340px; transition:border-color .3s;
}
.cta-form:focus-within{border-color:rgba(255,255,255,.4)}
.cta-form input{
  flex:1; min-width:0; background:none; border:none; outline:none;
  color:#fff; font:inherit; font-family:var(--font-sans);
}
.cta-form input::placeholder{color:rgba(255,255,255,.45)}
.cta-send{
  width:34px; height:34px; border-radius:9999px; flex-shrink:0;
  background:rgba(255,255,255,.1); display:grid; place-items:center; cursor:pointer;
  transition:background .3s;
}
.cta-send:hover{background:rgba(255,255,255,.18)}
.pop{animation:pop .2s ease}
@keyframes pop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:none}}

.demo-link{
  font-size:13px; font-weight:500; letter-spacing:.02em;
  color:rgba(255,255,255,.8); cursor:pointer; transition:color .3s;
  animation:up 1s .8s cubic-bezier(.16,1,.3,1) both;
}
.demo-link:hover{color:rgba(255,255,255,.4)}

/* ── Topic rail ── */
.rail{
  position:relative; z-index:20;
  padding:0 1.5rem 1.6rem;
  display:flex; flex-direction:column; align-items:center; gap:.85rem;
  animation:up 1s .6s cubic-bezier(.16,1,.3,1) both;
}
.hint{
  font-family:var(--mono); font-size:9.5px; letter-spacing:.22em; text-transform:uppercase;
  color:rgba(255,255,255,.34);
}
.pills{
  display:flex; gap:.4rem; padding:.35rem; border-radius:9999px;
  max-width:100%; overflow-x:auto; scrollbar-width:none;
}
.pills::-webkit-scrollbar{display:none}
.pill{
  white-space:nowrap; border-radius:9999px; padding:.5rem 1.05rem;
  font-size:.8rem; font-weight:500; color:rgba(255,255,255,.55);
  cursor:pointer; transition:color .3s,background .3s;
}
.pill:hover{color:rgba(255,255,255,.9)}
.pill.on{color:#000; background:#fff}

@media(max-height:620px){
  .sub,.stats{display:none}
  .hero-inner{gap:1.1rem}
}
</style>
</head>
<body>
<main>
  <!-- background: live physics instead of a video loop -->
  <div class="bg" id="bg"><canvas id="cv"></canvas></div>
  <div class="vignette"></div>

  <nav>
    <div class="nav-inner liquid-glass">
      <div class="nav-left">
        <div class="brand">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/>
            <ellipse cx="12" cy="12" rx="10" ry="4.4"/>
            <ellipse cx="12" cy="12" rx="10" ry="4.4" transform="rotate(60 12 12)"/>
            <ellipse cx="12" cy="12" rx="10" ry="4.4" transform="rotate(120 12 12)"/>
          </svg>
          <span>PhysicsEasy</span>
        </div>
        <div class="nav-links">
          <a href="#">課題</a><a href="#">筆記</a><a href="#">歷屆試題</a><a href="#">模擬實驗</a>
        </div>
      </div>
      <div class="nav-right">
        <button class="btn-text">註冊</button>
        <button class="btn-glass liquid-glass">登入</button>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-inner">
      <p class="tagline" id="tagline">HKDSE 物理 · 互動學習平台</p>
      <h1 id="head">看得見的物理<br class="brk" />才學得會</h1>
      <p class="sub" id="sub">拋體、天體、氣體、光、電磁與核 —— 背後是一整片可互動的物理力場。以真實模擬與歷屆試題，把每一次做錯，變成真正搞懂的一刻。</p>
      <div class="stats" id="stats"></div>

      <div class="cta" id="cta"></div>
      <div class="demo-link" id="demoLink">觀看模擬實驗 Demo →</div>
    </div>
  </section>

  <div class="rail">
    <div class="hint" id="hint">移動滑鼠 · 點擊互動</div>
    <div class="pills liquid-glass" id="pills"></div>
  </div>
</main>

<script>
const TAU = Math.PI*2;

/* ═══════════ Scenes ═══════════ */

const projectile = (S) => {
  let shots=[];
  const launcher=()=>({x:S.W*0.12,y:S.H*0.84});
  const fire=(px,py)=>{
    const l=launcher(),k=0.16; let vx=(px-l.x)*k, vy=(py-l.y)*k;
    const max=S.H*0.03, m=Math.hypot(vx,vy);
    if(m>max){vx=vx/m*max; vy=vy/m*max;}
    if(vy>0) vy=-Math.abs(vy)*0.6;
    shots.push({x:l.x,y:l.y,vx,vy,g:S.H*0.00034,tr:[]});
  };
  S.setInit(()=>{shots=[];});
  S.onDown=(x,y)=>fire(x,y);
  S.tick=()=>{
    if(Math.random()<0.014&&shots.length<7){
      const a=(48+Math.random()*18)*Math.PI/180, sp=S.H*0.021, l=launcher();
      shots.push({x:l.x,y:l.y,vx:Math.cos(a)*sp,vy:-Math.sin(a)*sp,g:S.H*0.00034,tr:[]});
    }
  };
  return ()=>{
    const c=S.ctx,l=launcher(); c.clearRect(0,0,S.W,S.H);
    const s=52*S.DPR;
    c.strokeStyle="rgba(255,255,255,.045)"; c.lineWidth=1; c.beginPath();
    for(let x=0;x<S.W;x+=s){c.moveTo(x,0);c.lineTo(x,S.H);}
    for(let y=0;y<S.H;y+=s){c.moveTo(0,y);c.lineTo(S.W,y);}
    c.stroke();
    c.strokeStyle="rgba(255,255,255,.16)"; c.lineWidth=S.DPR;
    c.beginPath(); c.moveTo(0,S.H*0.84); c.lineTo(S.W,S.H*0.84); c.stroke();
    if(S.pointer.active){
      c.strokeStyle="rgba(251,146,60,.45)"; c.setLineDash([4*S.DPR,7*S.DPR]); c.lineWidth=1.4*S.DPR;
      c.beginPath(); c.moveTo(l.x,l.y); c.lineTo(S.pointer.x,S.pointer.y); c.stroke(); c.setLineDash([]);
    }
    for(let i=shots.length-1;i>=0;i--){
      const p=shots[i];
      p.vy+=p.g; p.x+=p.vx; p.y+=p.vy;
      p.tr.push([p.x,p.y]); if(p.tr.length>90) p.tr.shift();
      for(let k=1;k<p.tr.length;k++){
        const al=(k/p.tr.length)*0.65;
        c.strokeStyle="rgba(34,211,238,"+al.toFixed(3)+")"; c.lineWidth=al*2.4*S.DPR;
        c.beginPath(); c.moveTo(p.tr[k-1][0],p.tr[k-1][1]); c.lineTo(p.tr[k][0],p.tr[k][1]); c.stroke();
      }
      c.beginPath(); c.arc(p.x,p.y,4*S.DPR,0,TAU);
      c.fillStyle="#67e8f9"; c.shadowColor="rgba(34,211,238,.9)"; c.shadowBlur=14*S.DPR; c.fill(); c.shadowBlur=0;
      if(p.y>S.H*0.84||p.x>S.W+40) shots.splice(i,1);
    }
    c.fillStyle="rgba(255,255,255,.75)";
    c.fillRect(l.x-7*S.DPR,l.y-4*S.DPR,14*S.DPR,4*S.DPR);
  };
};

const light = (S) => {
  const SPEC=["255,64,64","255,150,40","255,224,60","70,220,120","60,180,255","120,110,255","190,90,255"];
  let apex,bl,br,hit,t=0;
  S.setInit(()=>{
    t=0; const s=Math.min(S.W,S.H)*0.2, cX=S.W*0.5;
    apex={x:cX,y:S.H*0.5-s}; bl={x:cX-s*0.7,y:S.H*0.5+s*0.7}; br={x:cX+s*0.7,y:S.H*0.5+s*0.7};
    hit={x:(bl.x+apex.x)/2,y:(bl.y+apex.y)/2};
  });
  return ()=>{
    const c=S.ctx; t+=0.02; c.clearRect(0,0,S.W,S.H);
    const srcY=S.pointer.active
      ? Math.max(S.H*0.1,Math.min(S.H*0.9,S.pointer.y))
      : hit.y+Math.sin(t)*S.H*0.07;
    const inc=Math.atan2(hit.y-srcY,hit.x);
    c.globalCompositeOperation="lighter";
    c.strokeStyle="rgba(255,255,255,.8)"; c.lineWidth=2.2*S.DPR;
    c.shadowColor="rgba(255,255,255,.6)"; c.shadowBlur=10*S.DPR;
    c.beginPath(); c.moveTo(0,srcY); c.lineTo(hit.x,hit.y); c.stroke(); c.shadowBlur=0;
    const base=0.12+inc*0.35, spread=0.5;
    for(let i=0;i<SPEC.length;i++){
      const f=i/(SPEC.length-1), a=base+f*spread, len=S.W*0.4;
      c.strokeStyle="rgba("+SPEC[i]+",.75)"; c.lineWidth=2*S.DPR;
      c.shadowColor="rgba("+SPEC[i]+",.6)"; c.shadowBlur=8*S.DPR;
      c.beginPath(); c.moveTo(hit.x,hit.y);
      c.lineTo(hit.x+Math.cos(a)*len, hit.y+Math.sin(a)*len); c.stroke();
    }
    c.shadowBlur=0; c.globalCompositeOperation="source-over";
    c.beginPath(); c.moveTo(apex.x,apex.y); c.lineTo(bl.x,bl.y); c.lineTo(br.x,br.y); c.closePath();
    const pg=c.createLinearGradient(bl.x,apex.y,br.x,br.y);
    pg.addColorStop(0,"rgba(167,139,250,.14)"); pg.addColorStop(1,"rgba(34,211,238,.14)");
    c.fillStyle=pg; c.fill();
    c.strokeStyle="rgba(200,220,255,.5)"; c.lineWidth=1.5*S.DPR; c.stroke();
  };
};

const gas = (S) => {
  let mol=[], boost=1;
  const pad=()=>Math.min(S.W,S.H)*0.16;
  S.setInit(()=>{
    const p=pad(), sp=S.H*0.0035;
    mol=Array.from({length:40},()=>({
      x:p+Math.random()*(S.W-2*p), y:p+Math.random()*(S.H-2*p),
      vx:(Math.random()-.5)*sp*2, vy:(Math.random()-.5)*sp*2, r:Math.random()*3+3}));
  });
  S.onDown=()=>{ boost=1; for(const m of mol){m.vx*=1.3;m.vy*=1.3;} };
  S.readK=()=>{
    let s=0; for(const m of mol) s+=m.vx*m.vx+m.vy*m.vy;
    return s/mol.length/((S.H*0.0035)**2);
  };
  return ()=>{
    const c=S.ctx,p=pad(); c.clearRect(0,0,S.W,S.H);
    c.strokeStyle="rgba(251,146,60,.3)"; c.lineWidth=1.4*S.DPR;
    c.strokeRect(p,p,S.W-2*p,S.H-2*p);
    if(S.pointer.active){
      const g=c.createRadialGradient(S.pointer.x,S.pointer.y,0,S.pointer.x,S.pointer.y,95*S.DPR);
      g.addColorStop(0,"rgba(251,146,60,.16)"); g.addColorStop(1,"rgba(251,146,60,0)");
      c.fillStyle=g; c.beginPath(); c.arc(S.pointer.x,S.pointer.y,95*S.DPR,0,TAU); c.fill();
    }
    const vmax=S.H*0.011;
    for(const m of mol){
      if(S.pointer.active){
        const dx=m.x-S.pointer.x,dy=m.y-S.pointer.y,d=Math.hypot(dx,dy);
        if(d<95*S.DPR&&d>.1){const f=(1-d/(95*S.DPR))*.55*S.DPR; m.vx+=dx/d*f; m.vy+=dy/d*f;}
      }
      const sp=Math.hypot(m.vx,m.vy);
      if(sp>vmax){m.vx=m.vx/sp*vmax; m.vy=m.vy/sp*vmax;}
      m.x+=m.vx; m.y+=m.vy;
      if(m.x<p+m.r||m.x>S.W-p-m.r){m.vx*=-1; m.x=Math.max(p+m.r,Math.min(S.W-p-m.r,m.x));}
      if(m.y<p+m.r||m.y>S.H-p-m.r){m.vy*=-1; m.y=Math.max(p+m.r,Math.min(S.H-p-m.r,m.y));}
      const hot=Math.min(1,Math.hypot(m.vx,m.vy)/(S.H*0.0065));
      c.beginPath(); c.arc(m.x,m.y,m.r*S.DPR,0,TAU);
      c.fillStyle="rgba(251,"+Math.round(146+hot*50)+","+Math.round(70+(1-hot)*120)+",.95)";
      c.shadowColor="rgba(251,146,60,.75)"; c.shadowBlur=10*S.DPR; c.fill(); c.shadowBlur=0;
    }
  };
};

const astronomy = (S) => {
  let bodies=[],stars=[],cx=0,cy=0,GM=0,t=0;
  const soft=()=>(Math.min(S.W,S.H)*0.04)**2;
  const spawn=(r,col,rad,ang)=>{
    const v=Math.sqrt(GM/rad);
    return {x:cx+Math.cos(ang)*rad, y:cy+Math.sin(ang)*rad,
            vx:-Math.sin(ang)*v, vy:Math.cos(ang)*v, r, c:col, tr:[]};
  };
  S.setInit(()=>{
    cx=S.W*0.5; cy=S.H*0.5; t=0;
    const min=Math.min(S.W,S.H);
    GM=(4*Math.PI*Math.PI*(min*0.3)**3)/(430*430);
    stars=Array.from({length:110},()=>({x:Math.random()*S.W,y:Math.random()*S.H,ph:Math.random()*TAU,r:Math.random()*1.3+.3}));
    bodies=[spawn(4.5*S.DPR,"34,211,238",min*0.2,0),
            spawn(6*S.DPR,"167,139,250",min*0.3,2),
            spawn(3.5*S.DPR,"234,240,255",min*0.4,4)];
  });
  S.onDown=(x,y)=>{
    if(bodies.length>=7) bodies.shift();
    const dx=x-cx,dy=y-cy;
    const cols=["34,211,238","167,139,250","251,146,60","234,240,255"];
    bodies.push(spawn(4*S.DPR,cols[(Math.random()*cols.length)|0],Math.hypot(dx,dy)||1,Math.atan2(dy,dx)));
  };
  return ()=>{
    const c=S.ctx; t++;
    c.fillStyle="rgba(0,0,0,.32)"; c.fillRect(0,0,S.W,S.H);
    for(const s of stars){
      const tw=.5+.5*Math.sin(t*.03+s.ph);
      c.beginPath(); c.arc(s.x,s.y,s.r*S.DPR,0,TAU);
      c.fillStyle="rgba(234,240,255,"+(.12+tw*.38).toFixed(2)+")"; c.fill();
    }
    const rad=Math.min(S.W,S.H)*0.16;
    const g=c.createRadialGradient(cx,cy,0,cx,cy,rad);
    g.addColorStop(0,"rgba(255,210,122,.85)"); g.addColorStop(.4,"rgba(251,146,60,.28)"); g.addColorStop(1,"rgba(251,146,60,0)");
    c.fillStyle=g; c.beginPath(); c.arc(cx,cy,rad,0,TAU); c.fill();
    c.beginPath(); c.arc(cx,cy,9*S.DPR,0,TAU);
    c.fillStyle="#ffe6ad"; c.shadowColor="rgba(255,210,122,.9)"; c.shadowBlur=28*S.DPR; c.fill(); c.shadowBlur=0;
    const eps=soft();
    for(let i=bodies.length-1;i>=0;i--){
      const b=bodies[i];
      let dx=cx-b.x,dy=cy-b.y,r2=dx*dx+dy*dy+eps,inv=GM/(r2*Math.sqrt(r2));
      b.vx+=dx*inv; b.vy+=dy*inv;
      if(S.pointer.active){
        dx=S.pointer.x-b.x; dy=S.pointer.y-b.y; r2=dx*dx+dy*dy+eps; inv=GM*.5/(r2*Math.sqrt(r2));
        b.vx+=dx*inv; b.vy+=dy*inv;
      }
      b.x+=b.vx; b.y+=b.vy; b.tr.push([b.x,b.y]); if(b.tr.length>52) b.tr.shift();
      for(let k=1;k<b.tr.length;k++){
        const al=k/b.tr.length*.5;
        c.strokeStyle="rgba("+b.c+","+al.toFixed(3)+")"; c.lineWidth=al*2.6*S.DPR;
        c.beginPath(); c.moveTo(b.tr[k-1][0],b.tr[k-1][1]); c.lineTo(b.tr[k][0],b.tr[k][1]); c.stroke();
      }
      c.beginPath(); c.arc(b.x,b.y,b.r,0,TAU);
      c.fillStyle="rgb("+b.c+")"; c.shadowColor="rgba("+b.c+",.9)"; c.shadowBlur=12*S.DPR; c.fill(); c.shadowBlur=0;
      const d=Math.hypot(b.x-cx,b.y-cy);
      if(i>=3&&(d>Math.max(S.W,S.H)||d<11*S.DPR)) bodies.splice(i,1);
    }
  };
};

/* 電和磁：電偶極的電場線（由 + 電荷積分追蹤） */
const emag = (S) => {
  let q=[], t=0;
  S.setInit(()=>{
    t=0; const d=Math.min(S.W,S.H)*0.2;
    q=[{x:S.W*0.5-d,y:S.H*0.5,s:1},{x:S.W*0.5+d,y:S.H*0.5,s:-1}];
  });
  S.onDown=()=>{ for(const p of q) p.s*=-1; };
  const E=(x,y)=>{
    let ex=0,ey=0;
    for(const p of q){
      const dx=x-p.x, dy=y-p.y, r2=dx*dx+dy*dy+(9*S.DPR)**2, r=Math.sqrt(r2);
      const k=p.s/(r2*r); ex+=dx*k; ey+=dy*k;
    }
    return [ex,ey];
  };
  return ()=>{
    const c=S.ctx; t+=0.012; c.clearRect(0,0,S.W,S.H);
    // pointer acts as a movable test charge
    const test = S.pointer.active ? {x:S.pointer.x,y:S.pointer.y,s:1} : null;
    if(test) q.push(test);
    const step=3*S.DPR, N=18;
    for(const p of q){
      if(p.s<0) continue;
      for(let i=0;i<N;i++){
        const a=i/N*TAU + t;
        let x=p.x+Math.cos(a)*11*S.DPR, y=p.y+Math.sin(a)*11*S.DPR;
        c.beginPath(); c.moveTo(x,y);
        for(let k=0;k<220;k++){
          const [ex,ey]=E(x,y), m=Math.hypot(ex,ey);
          if(!m) break;
          x+=ex/m*step; y+=ey/m*step;
          if(x<0||y<0||x>S.W||y>S.H) break;
          c.lineTo(x,y);
          let done=false;
          for(const o of q) if(o.s<0 && Math.hypot(x-o.x,y-o.y)<12*S.DPR) done=true;
          if(done) break;
        }
        c.strokeStyle=p===test?"rgba(255,224,90,.45)":"rgba(34,211,238,.32)";
        c.lineWidth=1.2*S.DPR; c.stroke();
      }
    }
    for(const p of q){
      const col=p.s>0?"251,146,60":"96,165,250";
      c.beginPath(); c.arc(p.x,p.y,10*S.DPR,0,TAU);
      c.fillStyle="rgba("+col+",.95)"; c.shadowColor="rgba("+col+",.9)"; c.shadowBlur=22*S.DPR; c.fill(); c.shadowBlur=0;
      c.strokeStyle="rgba(0,0,0,.55)"; c.lineWidth=2*S.DPR; c.beginPath();
      c.moveTo(p.x-4.5*S.DPR,p.y); c.lineTo(p.x+4.5*S.DPR,p.y);
      if(p.s>0){ c.moveTo(p.x,p.y-4.5*S.DPR); c.lineTo(p.x,p.y+4.5*S.DPR); }
      c.stroke();
    }
    if(test) q.pop();
  };
};

/* 放射現象：不穩定核衰變，射出 α / β / γ */
const nuclear = (S) => {
  let nucleons=[], rays=[], decays=0, cx=0, cy=0, t=0;
  const R=()=>Math.min(S.W,S.H)*0.06;
  const emit=()=>{
    decays++;
    const kind=["a","b","g"][(Math.random()*3)|0];
    const a=Math.random()*TAU, sp=(kind==="g"?9:kind==="b"?6:3.2)*S.DPR;
    rays.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,k:kind,tr:[]});
    if(rays.length>26) rays.shift();
  };
  S.setInit(()=>{
    cx=S.W*0.5; cy=S.H*0.5; t=0; decays=0; rays=[];
    nucleons=Array.from({length:30},(_,i)=>({ph:Math.random()*TAU,rr:Math.random(),p:i%2===0}));
  });
  S.onDown=()=>emit();
  S.tick=()=>{ if(Math.random()<0.03) emit(); };
  S.readD=()=>decays;
  return ()=>{
    const c=S.ctx; t+=0.03; c.clearRect(0,0,S.W,S.H);
    const r=R();
    const g=c.createRadialGradient(cx,cy,0,cx,cy,r*3.4);
    g.addColorStop(0,"rgba(167,139,250,.24)"); g.addColorStop(1,"rgba(167,139,250,0)");
    c.fillStyle=g; c.beginPath(); c.arc(cx,cy,r*3.4,0,TAU); c.fill();
    const COL={a:"251,146,60",b:"34,211,238",g:"167,139,250"};
    for(let i=rays.length-1;i>=0;i--){
      const p=rays[i];
      p.x+=p.vx; p.y+=p.vy; p.tr.push([p.x,p.y]); if(p.tr.length>34) p.tr.shift();
      const col=COL[p.k];
      for(let k=1;k<p.tr.length;k++){
        const al=k/p.tr.length*(p.k==="g"?.55:.75);
        c.strokeStyle="rgba("+col+","+al.toFixed(3)+")"; c.lineWidth=al*(p.k==="a"?3.2:2)*S.DPR;
        c.beginPath(); c.moveTo(p.tr[k-1][0],p.tr[k-1][1]); c.lineTo(p.tr[k][0],p.tr[k][1]); c.stroke();
      }
      c.beginPath(); c.arc(p.x,p.y,(p.k==="a"?3.4:2.2)*S.DPR,0,TAU);
      c.fillStyle="rgb("+col+")"; c.shadowColor="rgba("+col+",.9)"; c.shadowBlur=12*S.DPR; c.fill(); c.shadowBlur=0;
      if(p.x<-30||p.y<-30||p.x>S.W+30||p.y>S.H+30) rays.splice(i,1);
    }
    for(const n of nucleons){
      const a=n.ph+t*(.35+n.rr*.5), rr=r*(.25+n.rr*.75);
      const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr*.92;
      const col=n.p?"251,146,60":"200,214,255";
      c.beginPath(); c.arc(x,y,3.4*S.DPR,0,TAU);
      c.fillStyle="rgba("+col+",.95)"; c.shadowColor="rgba("+col+",.7)"; c.shadowBlur=8*S.DPR; c.fill(); c.shadowBlur=0;
    }
    c.strokeStyle="rgba(167,139,250,.3)"; c.lineWidth=1.2*S.DPR;
    c.beginPath(); c.arc(cx,cy,r*1.35,0,TAU); c.stroke();
  };
};

const SCENES={projectile,light,gas,emag,nuclear,astronomy};

/* ═══════════ Topics (HKDSE 課題 → 概念 → 實驗) ═══════════ */

/* ═══════════ Canvas driver ═══════════ */
const canvas=document.getElementById("cv");
const bg=document.getElementById("bg");
const ctx=canvas.getContext("2d");
const pointer={x:-9999,y:-9999,active:false};
let W=0,H=0,DPR=1,init=null,draw=null,S=null,raf=null;

function mountScene(name){
  init=null;
  S={ctx,get W(){return W},get H(){return H},get DPR(){return DPR},pointer,setInit(f){init=f}};
  draw=SCENES[name](S);
  resize();
}
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=canvas.width=Math.max(1,bg.clientWidth*DPR);
  H=canvas.height=Math.max(1,bg.clientHeight*DPR);
  canvas.style.width=bg.clientWidth+"px";
  canvas.style.height=bg.clientHeight+"px";
  if(init) init();
}
addEventListener("resize",resize);

const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
function loop(){ S?.tick?.(); draw?.(); raf=requestAnimationFrame(loop); }

// pointer wiring on the whole screen (canvas itself is pointer-events:none)
addEventListener("pointermove",e=>{
  const r=bg.getBoundingClientRect();
  pointer.x=(e.clientX-r.left)*DPR; pointer.y=(e.clientY-r.top)*DPR; pointer.active=true;
});
addEventListener("pointerleave",()=>{pointer.active=false});
addEventListener("pointerdown",e=>{
  if(e.target.closest("nav,.rail,.cta")) return;
  const r=bg.getBoundingClientRect();
  pointer.x=(e.clientX-r.left)*DPR; pointer.y=(e.clientY-r.top)*DPR; pointer.active=true;
  S?.onDown?.(pointer.x,pointer.y);
});

/* ═══════════ Topic switching ═══════════ */
const tagEl=document.getElementById("tagline"), headEl=document.getElementById("head"),
      subEl=document.getElementById("sub"), hintEl=document.getElementById("hint"),
      statsEl=document.getElementById("stats"), pillsEl=document.getElementById("pills");
let current=-1;

function swap(el,html){
  el.classList.remove("swap"); void el.offsetWidth;
  el.innerHTML=html; el.classList.add("swap");
}
function selectTopic(i){
  if(i===current) return;
  current=i; const T=TOPICS[i];
  canvas.classList.remove("on");
  setTimeout(()=>{ mountScene(T.scene); canvas.classList.add("on"); },260);
  swap(tagEl,T.tag); swap(headEl,T.head); swap(subEl,T.sub); swap(hintEl,T.hint);
  swap(statsEl,T.stats.map(([v,l])=>`<div class="stat"><b>${v}</b><span>${l}</span></div>`).join(""));
  [...pillsEl.children].forEach((b,k)=>b.classList.toggle("on",k===i));
}
TOPICS.forEach((T,i)=>{
  const b=document.createElement("button");
  b.className="pill"; b.textContent=T.pill;
  b.onclick=()=>selectTopic(i);
  pillsEl.appendChild(b);
});

/* ═══════════ CTA: button ⇄ email form with typewriter ═══════════ */
const cta=document.getElementById("cta");
const ARROW=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;
const CHECK=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`;
let typer=null, resetT=null;

function typewrite(input,text){
  clearInterval(typer); input.placeholder=""; let i=0;
  typer=setInterval(()=>{
    input.placeholder=text.slice(0,++i);
    if(i>=text.length) clearInterval(typer);
  },60);
}
function showButton(){
  clearInterval(typer); clearTimeout(resetT);
  cta.innerHTML=`<button class="cta-btn pop" id="ctaBtn">立即開始學習</button>`;
  document.getElementById("ctaBtn").onclick=showForm;
}
function showForm(){
  cta.innerHTML=`<form class="cta-form pop" id="ctaForm" autocomplete="off">
      <input type="email" required id="ctaInput" />
      <button class="cta-send" type="submit" id="ctaSend">${ARROW}</button>
    </form>`;
  const input=document.getElementById("ctaInput");
  input.focus();
  typewrite(input,"輸入電郵 · 搶先體驗 PhysicsEasy");
  document.getElementById("ctaForm").onsubmit=e=>{
    e.preventDefault();
    const send=document.getElementById("ctaSend");
    send.innerHTML=CHECK; send.classList.add("pop");
    input.value=""; input.blur();
    typewrite(input,"我們會以電郵通知你");
    resetT=setTimeout(showButton,4000);
  };
}
showButton();
document.getElementById("demoLink").onclick=()=>selectTopic((current+1)%TOPICS.length);

/* ═══════════ Boot ═══════════ */
selectTopic(0);
mountScene(TOPICS[0].scene);
canvas.classList.add("on");
if(!reduce) loop(); else draw?.();
